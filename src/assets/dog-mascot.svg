<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 270" role="img" aria-labelledby="title">
  <title id="title">Black Lab and bulldog mix with a white chest and mismatched white paws</title>
  <g stroke="#1e4834" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- seated body -->
    <path fill="#252e28" d="M54 137c-24 21-35 55-31 100 28 17 165 17 194 0 4-44-9-79-35-101-29-24-99-24-128 1z"/>
    <!-- back legs -->
    <path fill="#202923" d="M32 220c-10 7-14 19-10 32 19 8 45 7 60-4l-5-31c-17-5-32-4-45 3zm175 0c10 7 14 19 10 32-19 8-45 7-60-4l5-31c17-5 32-4 45 3z"/>
    <!-- neck -->
    <path fill="#252e28" d="M72 112c4 44 18 62 48 62s45-18 49-62z"/>
    <!-- floppy ears -->
    <path fill="#1d2621" d="M78 50C60 30 37 34 31 55c-5 20 7 48 32 59 17-13 24-42 15-64zm84 0c18-20 41-16 47 5 5 20-7 48-32 59-17-13-24-42-15-64z"/>
    <!-- head -->
    <path fill="#252e28" d="M58 80c0-39 25-65 62-65s62 26 62 65c0 45-22 77-62 77S58 125 58 80z"/>
    <!-- brow and cheeks -->
    <path fill="#303a33" d="M70 85c8-15 23-23 50-23s42 8 50 23c8 17 2 47-13 60-10 9-23 14-37 14s-27-5-37-14C68 132 62 102 70 85z"/>
    <!-- muzzle -->
    <path fill="#3a443d" d="M82 109c7-15 22-22 38-22s31 7 38 22c8 18-5 38-38 38s-46-20-38-38z"/>
    <!-- nose -->
    <path fill="#101713" d="M101 105c9-7 29-7 38 0-1 14-8 20-19 20s-18-6-19-20z"/>
    <path fill="none" d="M120 125v8m0 0c-6 8-14 10-23 5m23-5c6 8 14 10 23 5"/>
    <path fill="#e26742" stroke-width="4" d="M109 139c6 5 16 5 22 0-3 12-19 14-22 0z"/>
    <!-- white chest patch -->
    <path fill="#fbfaf5" d="M92 159c7 8 17 11 28 8 10 3 20 0 28-8 3 30-6 61-28 82-23-22-32-53-28-82z"/>
    <!-- front legs -->
    <path fill="#252e28" d="M66 164c-10 24-12 56-6 81 12 7 29 7 40 0l3-68m71-13c10 24 12 56 6 81-12 7-29 7-40 0l-3-68"/>
    <!-- mismatched paws -->
    <path fill="#fbfaf5" d="M57 230h43v19c-10 8-31 8-41 1z"/>
    <path fill="#fbfaf5" d="M159 239h22v11c-6 4-15 4-22 1z"/>
    <!-- eyes -->
    <ellipse cx="94" cy="83" rx="6" ry="8" fill="#fbfaf5" stroke="none"/>
    <ellipse cx="146" cy="83" rx="6" ry="8" fill="#fbfaf5" stroke="none"/>
    <ellipse cx="94" cy="85" rx="3" ry="4" fill="#141b17" stroke="none"/>
    <ellipse cx="146" cy="85" rx="3" ry="4" fill="#141b17" stroke="none"/>
    <!-- brighter purple and gold Baltimore football-inspired collar -->
    <path fill="none" stroke="#6f2da8" stroke-width="10" d="M78 145c25 16 59 16 84 0"/>
    <path fill="none" stroke="#d9a441" stroke-width="3" d="M80 143c24 14 56 14 80 0"/>
    <circle cx="120" cy="158" r="8" fill="#d9a441" stroke-width="4"/>
    <path fill="none" stroke="#6f2da8" stroke-width="2.5" d="M116 154h8l-1.5 4 1.5 4h-8l1.5-4z"/>
  </g>
</svg>
